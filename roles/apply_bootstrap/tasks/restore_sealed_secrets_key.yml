---
# Restore the most recent sealed-secrets-controller key backup, if one exists,
# before ArgoCD deploys a fresh controller. The controller only generates a new
# keypair when it finds none labelled sealedsecrets.bitnami.com/sealed-secrets-key
# in kube-system on startup — restoring the old key first means it picks that
# one up instead, so every SealedSecret already committed to day1-foundation/
# day2-services stays decryptable. See docs/rebuild-gap-audit.md item 2.
#
# Backups are produced by the in-cluster sealed-secrets-backup CronJob
# (day0-bootstrap/apps/sealed-secrets/sealed-secrets-cron.yml, pinned to
# k8smaster), which writes `kubectl get secrets -l
# sealedsecrets.bitnami.com/sealed-secrets-key -o yaml` straight into this
# directory. The host-cron script of the same name was the original
# mechanism but was deliberately retired in favour of the CronJob; this task
# was never updated to match at the time, which is how the gap in item 2 of
# docs/rebuild-gap-audit.md happened - the CronJob kept running, just
# unpinned and writing somewhere this task didn't look. On a fresh rebuild
# there is nothing to restore yet — this is a no-op then.

- name: Find sealed-secrets key backups
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/credentials"
    patterns: "sealed-secrets-key-*.yaml"
  register: sealed_secrets_key_backups

- name: Determine newest sealed-secrets key backup
  ansible.builtin.set_fact:
    newest_sealed_secrets_backup: "{{ sealed_secrets_key_backups.files | sort(attribute='mtime') | last }}"
  when: sealed_secrets_key_backups.files | length > 0

- name: Fail loudly if the newest sealed-secrets key backup is stale
  ansible.builtin.assert:
    that:
      - (ansible_date_time.epoch | int) - (newest_sealed_secrets_backup.mtime | int) < 864000
    fail_msg: >-
      Newest sealed-secrets key backup ({{ newest_sealed_secrets_backup.path }})
      is more than 10 days old. Keys rotate roughly monthly, so this backup is
      very likely already missing the current active key — restoring it will
      silently orphan every SealedSecret sealed since. Check that the
      sealed-secrets-backup CronJob (day0-bootstrap/apps/sealed-secrets/sealed-secrets-cron.yml)
      is actually running against k8smaster and writing into this directory
      before proceeding.
    success_msg: "Newest sealed-secrets key backup is fresh enough to restore."
  when: sealed_secrets_key_backups.files | length > 0

- name: Restore most recent sealed-secrets key backup into kube-system
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    src: "{{ newest_sealed_secrets_backup.path }}"
  when: sealed_secrets_key_backups.files | length > 0
  become: true
