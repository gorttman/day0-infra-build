---
- name: Configure k3s to write kubeconfig with relaxed permissions
  ansible.builtin.lineinfile:
    path: /etc/rancher/k3s/config.yaml
    regexp: '^write-kubeconfig-mode:'
    line: 'write-kubeconfig-mode: "0644"'
    create: true
    mode: '0600'
  become: true

- name: Restart k3s to apply kubeconfig mode config
  ansible.builtin.service:
    name: k3s
    state: restarted
  become: true

- name: Extract kubeseal binary
  unarchive:
    src: /tmp/kubeseal.tar.gz
    dest: /usr/local/bin/
    remote_src: yes
    extra_opts: [kubeseal]
  become: true
  become_user: root

- name: Ensure kubeseal is executable
  file:
    path: /usr/local/bin/kubeseal
    mode: '0755'
    state: file
  become: true
  become_user: root
