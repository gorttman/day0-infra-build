---
- name: Configure k3s to write kubeconfig with relaxed permissions
  ansible.builtin.lineinfile:
    path: /etc/rancher/k3s/config.yaml
    regexp: '^write-kubeconfig-mode:'
    line: 'write-kubeconfig-mode: "0644"'
    create: true
    mode: '0600'
  become: true

# Without these, k3s auto-detects wlan0 (the primary/default-route interface)
# as its advertise address and broadcasts that to agents for the tunnel
# WebSocket. Workers can't reach 192.168.2.x (WiFi AP isolation), so the
# tunnel never connects and kubectl exec/logs return 502. Pinning both to the
# wired management NIC fixes it. See docs/pi-1-inventory.md §13b.
- name: Configure k3s advertise-address and tls-san for the management NIC
  ansible.builtin.blockinfile:
    path: /etc/rancher/k3s/config.yaml
    marker: "# {mark} ANSIBLE MANAGED BLOCK - management NIC advertise address"
    block: |
      tls-san:
        - {{ backend_vlan_ip }}
      advertise-address: {{ backend_vlan_ip }}
  become: true

- name: Restart k3s to apply config changes
  ansible.builtin.service:
    name: k3s
    state: restarted
  become: true

- name: Extract kubeseal binary
  unarchive:
    src: /tmp/kubeseal.tar.gz
    dest: /usr/local/bin/
    remote_src: yes
    extra_opts: [kubeseal]
  become: true
  become_user: root

- name: Ensure kubeseal is executable
  file:
    path: /usr/local/bin/kubeseal
    mode: '0755'
    state: file
  become: true
  become_user: root
