---
# QNAP NAS (valinor-m) client configuration for cluster nodes.
#
# The FQDN is pinned in /etc/hosts on the wired face because:
# - cluster nodes deliberately do NOT use Pi-hole for their own
#   resolution (DNS chicken-and-egg - see day1 pihole notes), and
# - kubelet performs NFS PersistentVolume mounts with the NODE's
#   resolver, so every node that may run a QNAP-mounting pod must
#   resolve this name;
# - Pi-hole serves qnap.i3sec.com.au -> 192.168.2.30 (WLAN face) to
#   normal clients; nodes use the wired face. Split view is intended.
qnap_fqdn: qnap.i3sec.com.au
qnap_wired_ip: 192.168.1.30

# Shared NFS root image used by all diskless pinodes - pinning the name
# here covers every netboot node at once.
netboot_root_path: /srv/nfs/rpios/latest
# Per-node overlays; each live pinode NFS-mounts <node>/etc over /etc,
# so the image pin alone does not reach running nodes.
netboot_cluster_path: /srv/nfs/cluster

# Host-level mounts on the machine running this play (k8smaster).
# Separate from pod storage - apps claim QNAP exports via
# PersistentVolumes (day1-foundation apps/qnap-storage), which mount
# per-pod on whichever node schedules the workload. These are for
# host-level access to the same shares directly from k8smaster (e.g.
# admin/backup tooling), not consumed by cluster pods.
#
# Export paths are bare top-level names (e.g. /books), NOT prefixed
# with /public_root - confirmed via `showmount -e qnap.i3sec.com.au`
# and a real test mount (2026-07-14). The qnap-books PV's
# /public_root/books path does NOT work as a fresh mount despite being
# what the live Kavita pod still uses - see day1-foundation
# apps/qnap-storage for that separate, pre-existing issue.
qnap_host_mounts:
  - path: /mnt/inbox
    export: /inbox
  - path: /mnt/photos
    export: /photos
  - path: /mnt/immich
    export: /immich
  - path: /mnt/books
    export: /books
  - path: /mnt/media
    export: /media
  - path: /mnt/paperless
    export: /paperless
  - path: /mnt/vault
    export: /vault
  - path: /mnt/cold
    export: /cold
  - path: /mnt/downloads
    export: /downloads
  - path: /mnt/backup
    export: /backup

# Where k8smaster's own credentials/ directory (git PAT, sealed-secrets
# key backups - see day0-infra-build/docs/rebuild-runbook.md Step 2) gets
# rsynced daily, off this host's disk. /backup is a pre-existing,
# substantial personal media/data share on the QNAP (Books/Movies/TV/
# Photo/Data already live at its root) - not a dedicated empty backup
# target - so this gets its own clearly-named subdirectory rather than
# landing at the export root.
credentials_backup_dest: /mnt/backup/k8smaster-credentials
