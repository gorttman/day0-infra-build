################################################################################
# FILE: roles/nfs_netboot/tasks/setup_tftp_structure.yml
################################################################################
---
# Boot files shared across all Pi 5 nodes.
- name: Set Pi 5 boot file list
  ansible.builtin.set_fact:
    pi5_boot_files:
      - start4.elf
      - bootcode.bin
      - kernel_2712.img
      - kernel8.img
      - bcm2712-rpi-5-b.dtb
      - initramfs_2712
      - initramfs8

# === Shared base/ directory — copied once, or on force_boot_files: true ===
- name: Create TFTP root and base/ directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ tftp_root }}"
    - "{{ tftp_root }}/base"

- name: Stat base boot files
  ansible.builtin.stat:
    path: "{{ tftp_root }}/base/{{ item }}"
  loop: "{{ pi5_boot_files }}"
  register: base_file_stats

- name: Copy shared boot files to base/ (skip if present)
  ansible.builtin.copy:
    src: "{{ nfs_os_path }}/boot/firmware/{{ item.item }}"
    dest: "{{ tftp_root }}/base/{{ item.item }}"
    mode: '0644'
    remote_src: true
  loop: "{{ base_file_stats.results }}"
  when: not item.stat.exists or (force_boot_files | default(false))
  loop_control:
    label: "base/{{ item.item }}"

- name: Stat base firmware overlay directory
  ansible.builtin.stat:
    path: "{{ tftp_root }}/base/firmware"
  register: base_firmware_stat

- name: Copy firmware overlay directory to base/ (skip if present)
  ansible.builtin.copy:
    src: "{{ nfs_os_path }}/boot/firmware/"
    dest: "{{ tftp_root }}/base/firmware/"
    mode: preserve
    remote_src: true
  when: not base_firmware_stat.stat.exists or (force_boot_files | default(false))

# === Per-node directories — symlinks + rendered config ===
- name: Create per-node TFTP directories
  ansible.builtin.file:
    path: "{{ tftp_root }}/{{ item.name }}"
    state: directory
    mode: '0755'
  loop: "{{ nodes | default([]) }}"
  when: (nodes | default([])) | length > 0

- name: Symlink per-node boot files to base/
  ansible.builtin.file:
    src: "../base/{{ item.1 }}"
    dest: "{{ tftp_root }}/{{ item.0.name }}/{{ item.1 }}"
    state: link
    force: true
  loop: "{{ (nodes | default([])) | product(pi5_boot_files) | list }}"
  when: (nodes | default([])) | length > 0
  loop_control:
    label: "{{ item.0.name }}/{{ item.1 }}"

- name: Symlink firmware overlay directory to base/
  ansible.builtin.file:
    src: "../base/firmware"
    dest: "{{ tftp_root }}/{{ item.name }}/firmware"
    state: link
    force: true
  loop: "{{ nodes | default([]) }}"
  when: (nodes | default([])) | length > 0

- name: Render cmdline.txt for each node
  ansible.builtin.template:
    src: cmdline.txt.j2
    dest: "{{ tftp_root }}/{{ item.name }}/cmdline.txt"
    mode: '0644'
  loop: "{{ nodes | default([]) }}"
  when: (nodes | default([])) | length > 0

- name: Render config.txt for each node
  ansible.builtin.template:
    src: config.txt.j2
    dest: "{{ tftp_root }}/{{ item.name }}/config.txt"
    mode: '0644'
  loop: "{{ nodes | default([]) }}"
  when: (nodes | default([])) | length > 0
